<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Degradado místico para el círculo exterior -->
        <linearGradient id="circle_grad" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
            <stop stop-color="#4C1D95" />
            <stop offset="0.5" stop-color="#8B5CF6" />
            <stop offset="1" stop-color="#4C1D95" />
        </linearGradient>

        <!-- Degradado suave para el cristal interior -->
        <radialGradient id="crystal_soft" cx="250" cy="250" r="180" fx="200" fy="200" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#DDD6FE" />
            <stop offset="60%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#581C87" />
        </radialGradient>
        
        <!-- Sombra suave para dar profundidad -->
        <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feOffset dx="0" dy="4" result="offsetBlur" />
            <feMerge>
                <feMergeNode in="offsetBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Sello Circular de Coleccionista -->
    <circle cx="250" cy="250" r="220" stroke="url(#circle_grad)" stroke-width="8" stroke-dasharray="10 5" opacity="0.3" />
    <circle cx="250" cy="250" r="200" stroke="url(#circle_grad)" stroke-width="2" />

    <!-- Forma de Gema Amatista Pulida (Menos picos, más orgánica) -->
    <path d="M250 80 L380 250 L250 420 L120 250 Z" fill="url(#crystal_soft)" opacity="0.9" filter="url(#soft_shadow)" />
    
    <!-- La "A" Estilizada (Estilo Serif Místico) -->
    <path d="M250 120 L320 360 H290 L275 300 H225 L210 360 H180 L250 120 Z" fill="white" fill-opacity="0.9" />
    <!-- Corte interno de la A -->
    <path d="M250 160 L235 260 H265 L250 160 Z" fill="#581C87" />

    <!-- Detalles de brillo místico (puntos de luz suaves) -->
    <circle cx="250" cy="80" r="12" fill="white" fill-opacity="0.2" filter="url(#soft_shadow)" />
    <circle cx="380" cy="250" r="8" fill="white" fill-opacity="0.2" filter="url(#soft_shadow)" />
    <circle cx="120" cy="250" r="8" fill="white" fill-opacity="0.2" filter="url(#soft_shadow)" />
    
    <!-- Decoración de runa/líneas elegantes -->
    <path d="M150 250 Q250 220 350 250" stroke="white" stroke-width="1" stroke-opacity="0.3" fill="none" />
    <path d="M150 250 Q250 280 350 250" stroke="white" stroke-width="1" stroke-opacity="0.3" fill="none" />
</svg>